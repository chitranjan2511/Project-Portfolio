        // --- Simplified ML Model Implementation in JavaScript ---
        
        const stopWords = new Set(['i', 'me', 'my', 'myself', 'we', 'our', 'ours', 'ourselves', 'you', 'your', 'yours', 'yourself', 'yourselves', 'he', 'him', 'his', 'himself', 'she', 'her', 'hers', 'herself', 'it', 'its', 'itself', 'they', 'them', 'their', 'theirs', 'themselves', 'what', 'which', 'who', 'whom', 'this', 'that', 'these', 'those', 'am', 'is', 'are', 'was', 'were', 'be', 'been', 'being', 'have', 'has', 'had', 'having', 'do', 'does', 'did', 'doing', 'a', 'an', 'the', 'and', 'but', 'if', 'or', 'because', 'as', 'until', 'while', 'of', 'at', 'by', 'for', 'with', 'about', 'against', 'between', 'into', 'through', 'during', 'before', 'after', 'above', 'below', 'to', 'from', 'up', 'down', 'in', 'out', 'on', 'off', 'over', 'under', 'again', 'further', 'then', 'once', 'here', 'there', 'when', 'where', 'why', 'how', 'all', 'any', 'both', 'each', 'few', 'more', 'most', 'other', 'some', 'such', 'no', 'nor', 'not', 'only', 'own', 'same', 'so', 'than', 'too', 'very', 's', 't', 'can', 'will', 'just', 'don', 'should', 'now']);

        function preprocessText(text) {
            if (!text || typeof text !== 'string') return [];
            const cleaned = text.toLowerCase().replace(/[^\w\s]/g, '');
            return cleaned.split(/\s+/).filter(word => word && !stopWords.has(word));
        }

        class TfidfVectorizer {
            constructor() {
                this.vocabulary = {};
                this.idf = {};
                this.vocabSize = 0;
            }

            fit(documents) {
                const docFrequencies = {};
                const numDocs = documents.length;

                documents.forEach(doc => {
                    const terms = preprocessText(doc);
                    const seenWords = new Set();
                    terms.forEach(term => {
                        if (!this.vocabulary.hasOwnProperty(term)) {
                            this.vocabulary[term] = this.vocabSize++;
                        }
                        if (!seenWords.has(term)) {
                            docFrequencies[term] = (docFrequencies[term] || 0) + 1;
                            seenWords.add(term);
                        }
                    });
                });

                for (const term in this.vocabulary) {
                    this.idf[term] = Math.log(numDocs / (docFrequencies[term] || 1));
                }
            }

            transform(documents) {
                return documents.map(doc => {
                    const terms = preprocessText(doc);
                    const vector = new Array(this.vocabSize).fill(0);
                    const termCounts = {};
                    terms.forEach(term => {
                        termCounts[term] = (termCounts[term] || 0) + 1;
                    });
                    
                    for (const term in termCounts) {
                        if (this.vocabulary.hasOwnProperty(term)) {
                            const termIndex = this.vocabulary[term];
                            const tf = termCounts[term] / terms.length;
                            vector[termIndex] = tf * this.idf[term];
                        }
                    }
                    return vector;
                });
            }
        }

        class LogisticRegression {
            constructor() {
                this.weights = null;
            }

            sigmoid(z) {
                return 1 / (1 + Math.exp(-z));
            }

            train(X, y, epochs = 100, learningRate = 0.1) {
                const numSamples = X.length;
                const numFeatures = X[0].length;
                this.weights = new Array(numFeatures).fill(0);

                for (let epoch = 0; epoch < epochs; epoch++) {
                    for (let i = 0; i < numSamples; i++) {
                        const features = X[i];
                        const target = y[i];
                        
                        let z = 0;
                        for (let j = 0; j < numFeatures; j++) {
                            z += features[j] * this.weights[j];
                        }
                        
                        const prediction = this.sigmoid(z);
                        const error = prediction - target;

                        for (let j = 0; j < numFeatures; j++) {
                            this.weights[j] -= learningRate * error * features[j];
                        }
                    }
                }
            }

            predict(X) {
                return X.map(features => {
                    let z = 0;
                    for (let j = 0; j < features.length; j++) {
                        z += features[j] * (this.weights[j] || 0);
                    }
                    const prediction = this.sigmoid(z);
                    return prediction >= 0.5 ? 1 : 0;
                });
            }
        }

        const descriptionInput = document.getElementById('description');
        const suggestionPopup = document.getElementById('suggestion-popup');
        const suggestionText = document.getElementById('suggestion-text');
        const statusText = document.getElementById('status-text');
        const loader = document.getElementById('loader');
        
        let model;
        let vectorizer;
        let debounceTimer;

        function parseCSV(data) {
            const lines = data.trim().split('\n');
            const headers = lines[0].split(',');
            const result = lines.slice(1).map(line => {
                // A simple regex to handle commas inside quotes
                const values = line.match(/(".*?"|[^",]+)(?=\s*,|\s*$)/g) || [];
                return headers.reduce((obj, header, i) => {
                    let value = values[i] || '';
                    if (value.startsWith('"') && value.endsWith('"')) {
                        value = value.slice(1, -1);
                    }
                    obj[header.trim()] = value;
                    return obj;
                }, {});
            });
            return result;
        }

        async function trainModel() {
            descriptionInput.disabled = true;

            // Artificial delay to allow UI to update
            await new Promise(resolve => setTimeout(resolve, 50)); 
            
            const data = parseCSV(csvData);
            const descriptions = data.map(row => row.Item_Description);
            const labels = data.map(row => (row.Classification === 'Capital' ? 1 : 0));

            vectorizer = new TfidfVectorizer();
            vectorizer.fit(descriptions);
            const X = vectorizer.transform(descriptions);
            
            model = new LogisticRegression();
            model.train(X, labels);
            
            // Update UI when training is complete
            statusText.textContent = 'Model is ready for classification!';
            loader.style.display = 'none';
            descriptionInput.disabled = false;
        }
        
        function classify(description) {
            if (!description.trim() || !model) {
                suggestionPopup.classList.remove('visible');
                return;
            }

            const X_new = vectorizer.transform([description]);
            const prediction = model.predict(X_new)[0];
            const result = prediction === 1 ? 'Capital' : 'Non-Capital';

            displaySuggestion(result);
        }

        function displaySuggestion(result) {
            suggestionText.textContent = result;
            if (result === 'Capital') {
                suggestionPopup.style.backgroundColor = '#f0fdf4'; // green-50
                suggestionPopup.style.borderColor = '#bbf7d0'; // green-200
                suggestionText.style.color = '#166534'; // green-800
            } else {
                suggestionPopup.style.backgroundColor = '#fffbeb'; // amber-50
                suggestionPopup.style.borderColor = '#fde68a'; // amber-200
                suggestionText.style.color = '#92400e'; // amber-800
            }
            suggestionPopup.classList.add('visible');
        }

        descriptionInput.addEventListener('input', (event) => {
            clearTimeout(debounceTimer);
            const description = event.target.value;
            if (description.length < 3) {
                suggestionPopup.classList.remove('visible');
                return;
            }
            debounceTimer = setTimeout(() => {
                classify(description);
            }, 500); // Wait 500ms after user stops typing
        });
        
        // Start training the model as soon as the page loads
        document.addEventListener('DOMContentLoaded', trainModel);
